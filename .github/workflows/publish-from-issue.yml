name: Publish from Issue

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: publish-from-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.issue.labels.*.name, 'post') &&
      github.event.issue.user.login == github.repository_owner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Convert issue to post
        run: python .github/scripts/issue_to_post.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts static/images/posts
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "post: issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Hugo
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: hugo --minify

      - name: Strip .DS_Store
        if: steps.commit.outputs.changed == 'true'
        run: find ./public -name .DS_Store -delete

      - name: Deploy
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: www.lantean.co
          exclude_assets: '**/.DS_Store'
